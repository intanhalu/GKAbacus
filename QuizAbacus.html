<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Latihan Abacus (Teka Nombor)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fffdf5;
    --red:#e63946;
    --red-dark:#c1121f;
    --blue:#1d63d1;
    --blue-dark:#134a9e;
    --yellow:#ffc300;
    --green:#2ea043;
    --purple:#7b2cbf;
    --orange:#ff7f11;
    --ink:#22223b;
    --good:#1fa35c;
    --bad:#e0455a;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Nunito',Arial,sans-serif;
    text-align:center;
    background:var(--bg);
    color:var(--ink);
    margin:0;
    padding:20px 10px 60px;
  }
  h1{
    margin:16px 0 4px;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:34px;
    letter-spacing:0.5px;
    color:var(--red);
  }
  .subtitle{color:var(--blue-dark); font-size:14px; margin-bottom:18px; font-weight:600;}

  .controls{margin:10px 0;}
  select, button{
    padding:10px 18px;
    margin:6px;
    font-size:15px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    border-radius:999px;
    border:none;
    cursor:pointer;
  }
  select{
    background:#fff;
    color:var(--ink);
    border:2px solid var(--blue);
  }
  button{
    background:var(--blue);
    color:#fff;
    box-shadow:0 4px 0 var(--blue-dark);
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  button:hover{ transform:translateY(-2px); box-shadow:0 6px 0 var(--blue-dark); background:#2a72e0; }
  button:active{ transform:translateY(1px); box-shadow:0 2px 0 var(--blue-dark); }

  #question{font-size:24px; margin:14px; font-weight:800; font-family:'Baloo 2',sans-serif; color:var(--purple);}
  #feedback{font-size:20px; margin:10px; font-weight:bold; min-height:28px;}
  #feedback.wrong{color:var(--bad);}

  .soroban{
    display:inline-flex;
    justify-content:center;
    margin:20px auto 30px;
    background:var(--blue);
    padding:26px 22px 44px;
    border-radius:22px;
    box-shadow:0 10px 0 var(--blue-dark), 0 14px 26px rgba(29,99,209,0.35);
    border:4px solid #fff;
  }
  .soroban.shake{ animation:shake .35s; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(8px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
  }
  .rod{
    position:relative;
    width:56px; height:260px;
    margin:0 10px;
    border-radius:10px;
    box-shadow:inset 0 0 8px rgba(0,0,0,0.2), 0 3px 0 rgba(0,0,0,0.15);
  }
  .rod:nth-child(5n+1){ background:var(--red); }
  .rod:nth-child(5n+2){ background:var(--yellow); }
  .rod:nth-child(5n+3){ background:var(--green); }
  .rod:nth-child(5n+4){ background:var(--purple); }
  .rod:nth-child(5n+5){ background:var(--orange); }
  .divider{
    position:absolute; top:100px; width:100%; height:6px;
    background:#22223b;
    border-radius:3px;
  }
  .bead{
    position:absolute; left:50%; transform:translateX(-50%);
    width:42px; height:22px; border-radius:50%;
    cursor:default;
  }
  .bead.heaven{
    background:#fff;
    box-shadow:inset -3px -3px 5px rgba(0,0,0,0.2), 0 2px 3px rgba(0,0,0,0.15);
  }
  .bead.heaven.active{
    background:var(--red);
    box-shadow:0 0 10px 4px rgba(230,57,70,0.6), inset -3px -3px 5px rgba(0,0,0,0.25);
  }
  .bead.earth{
    background:#fff;
    box-shadow:inset -3px -3px 5px rgba(0,0,0,0.2), 0 2px 3px rgba(0,0,0,0.15);
  }
  .bead.earth.active{
    background:var(--blue);
    box-shadow:0 0 10px 4px rgba(29,99,209,0.6), inset -3px -3px 5px rgba(0,0,0,0.25);
  }
  .label{
    position:absolute; bottom:-26px; width:100%; text-align:center;
    font-weight:800; color:#fff; font-size:12px;
    font-family:'Baloo 2',sans-serif;
    text-shadow:0 1px 2px rgba(0,0,0,0.3);
  }

  .answer-row{
    display:flex; justify-content:center; align-items:center; gap:10px;
    margin:10px 0 4px; flex-wrap:wrap;
  }
  #guessInput{
    width:160px; padding:12px 16px;
    font-size:20px; font-weight:700; text-align:center;
    font-family:'Baloo 2', sans-serif;
    border:3px solid var(--purple);
    border-radius:14px;
    color:var(--ink);
  }
  #guessInput:focus{ outline:none; border-color:var(--red); }

  /* ---------- Celebration popup ---------- */
  #celebrateOverlay{
    position:fixed; inset:0; background:rgba(60,20,90,0.5);
    display:none; align-items:center; justify-content:center;
    z-index:999; overflow:hidden;
  }
  #celebrateOverlay.show{display:flex;}
  .confetti{
    position:absolute; top:-40px;
    animation-name:fall;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
    pointer-events:none;
    z-index:1;
  }
  @keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0.9; }
  }
  .celebrate-card{
    position:relative; z-index:2;
    background:#fff; border-radius:20px; padding:32px 44px;
    text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.35);
    animation:pop .25s ease-out;
    border:4px solid var(--red);
  }
  @keyframes pop{
    0%{ transform:scale(0.7); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  .celebrate-msg{
    font-size:30px; font-weight:800; font-family:'Baloo 2',sans-serif; color:var(--good); margin-bottom:8px;
  }
  .celebrate-sub{ font-size:14px; color:var(--blue-dark); margin-bottom:18px; font-weight:700; }
  .celebrate-card button{ padding:10px 24px; font-size:15px; }

  a.home{display:inline-block; margin-top:10px; color:var(--blue); font-weight:700;}

  .soroban-wrap{
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding:4px 0;
  }
  .soroban-wrap .soroban{ margin:16px auto 26px; }

  @media (max-width: 480px){
    body{ padding:14px 8px 50px; }
    h1{ font-size:26px; }
    .subtitle{ font-size:13px; }
    select, button{ font-size:14px; padding:11px 16px; }
    #question{ font-size:20px; }
    #feedback{ font-size:18px; }
    .rod{ width:46px; margin:0 6px; }
    .bead{ width:34px; }
    .label{ font-size:11px; }
    #guessInput{ width:120px; font-size:18px; padding:10px 12px; }
    .celebrate-card{ padding:26px 22px; }
    .celebrate-msg{ font-size:24px; }
  }
</style>
</head>
<body>
  <h1>🧮 Teka Nombor Abakus</h1>
  <div class="subtitle">Baca biji-biji yang ditunjukkan pada abakus, kemudian tulis nombornya!</div>

  <div class="controls">
    <label for="level">Pilih Level:</label>
    <select id="level" onchange="newQuestion()">
      <option value="1">Beginner (1 Digit)</option>
      <option value="2">Intermediate (2 Digit)</option>
      <option value="3">Advanced (3 Digit)</option>
    </select>
    <button onclick="newQuestion()">Soalan Baharu</button>
  </div>

  <div id="question">Nombor berapakah ini?</div>

  <div class="soroban-wrap"><div class="soroban" id="soroban"></div></div>

  <div class="answer-row">
    <input type="number" id="guessInput" placeholder="?" autocomplete="off" />
    <button onclick="checkGuess()">Semak Jawapan</button>
  </div>
  <div id="feedback"></div>

  <div id="celebrateOverlay">
    <div class="celebrate-card">
      <div class="celebrate-msg">✅ Betul! 🎉 Syabas!</div>
      <div class="celebrate-sub" id="celebrateSub"></div>
      <button onclick="closeCelebrate()">Soalan Seterusnya</button>
    </div>
  </div>

  <a class="home" href="latihan_abacus_tambah.html">➕ Latihan Tambah</a> &nbsp;|&nbsp;
  <a class="home" href="latihan_abacus_tolak.html">➖ Latihan Tolak</a> &nbsp;|&nbsp;
  <a class="home" href="index.html">🏠 Back to Home</a>

<script>
// ---------- Layout constants (must match CSS bead/rod sizes) ----------
const BEAD_H = 22;
const EARTH_TOP = 110;     // just below the divider
const EARTH_BOTTOM = 248;  // bottom usable edge of the rod
const HEAVEN_INACTIVE_TOP = 14;
const HEAVEN_ACTIVE_TOP = 78; // touching the divider from above

const LABELS = ["Sa","Sepuluh","Seratus","Seribu","Sepuluh Ribu"]; // index = place value (0 = ones)

const sorobanEl = document.getElementById('soroban');
let rodsByPlace = [];   // DOM element per place value
let rodCount = 1;
let currentNumber = 0;
let celebrated = false;

// ---------- Building the soroban (read-only: no click handlers) ----------
function buildSoroban(n){
  rodCount = n;
  sorobanEl.innerHTML = "";
  rodsByPlace = [];
  for (let r = n - 1; r >= 0; r--) {
    const rod = document.createElement('div');
    rod.className = 'rod';
    rod.dataset.place = r;

    const divider = document.createElement('div');
    divider.className = 'divider';
    rod.appendChild(divider);

    const heaven = document.createElement('div');
    heaven.className = 'bead heaven';
    heaven.style.top = HEAVEN_INACTIVE_TOP + 'px';
    heaven.dataset.active = 'false';
    rod.appendChild(heaven);

    for (let idx = 0; idx < 4; idx++) {
      const earth = document.createElement('div');
      earth.className = 'bead earth';
      earth.dataset.index = idx;
      earth.dataset.active = 'false';
      earth.style.top = earthTopFor(idx, 0) + 'px';
      rod.appendChild(earth);
    }

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = LABELS[r];
    rod.appendChild(label);

    sorobanEl.appendChild(rod);
    rodsByPlace[r] = rod;
  }
}

function earthTopFor(idx, activeCount) {
  if (idx < activeCount) {
    return EARTH_TOP + idx * BEAD_H;
  }
  const rankFromBottom = 3 - idx;
  return EARTH_BOTTOM - BEAD_H - rankFromBottom * BEAD_H;
}

function setHeaven(rod, active){
  const h = rod.querySelector('.heaven');
  h.dataset.active = active ? 'true' : 'false';
  h.style.top = (active ? HEAVEN_ACTIVE_TOP : HEAVEN_INACTIVE_TOP) + 'px';
  h.classList.toggle('active', active);
}

function setEarthCount(rod, newCount){
  newCount = Math.max(0, Math.min(4, newCount));
  rod.querySelectorAll('.earth').forEach(b => {
    const idx = parseInt(b.dataset.index);
    const active = idx < newCount;
    b.dataset.active = active ? 'true' : 'false';
    b.style.top = earthTopFor(idx, newCount) + 'px';
    b.classList.toggle('active', active);
  });
}

function setRodDigit(rod, digit){
  setHeaven(rod, digit >= 5);
  setEarthCount(rod, digit % 5);
}

function setSorobanNumber(num){
  for (let r = 0; r < rodCount; r++) {
    const digit = Math.floor(num / Math.pow(10, r)) % 10;
    setRodDigit(rodsByPlace[r], digit);
  }
}

// ---------- Question generation ----------
function levelConfig(level){
  if (level === "1") return { min:1, max:9, rods:1 };
  if (level === "2") return { min:10, max:99, rods:2 };
  return { min:100, max:999, rods:3 };
}

function newQuestion(){
  const level = document.getElementById('level').value;
  const cfg = levelConfig(level);

  currentNumber = Math.floor(Math.random() * (cfg.max - cfg.min + 1)) + cfg.min;
  celebrated = false;

  buildSoroban(cfg.rods);
  setSorobanNumber(currentNumber);

  const input = document.getElementById('guessInput');
  input.value = "";
  const fb = document.getElementById('feedback');
  fb.textContent = "";
  fb.classList.remove('wrong');
  input.focus();
}

function checkGuess(){
  const input = document.getElementById('guessInput');
  const guess = parseInt(input.value, 10);
  const fb = document.getElementById('feedback');

  if (isNaN(guess)) {
    fb.textContent = "✏️ Masukkan satu nombor dahulu!";
    fb.classList.add('wrong');
    return;
  }

  if (guess === currentNumber) {
    fb.textContent = "";
    fb.classList.remove('wrong');
    if (!celebrated) {
      celebrated = true;
      celebrate();
    }
  } else {
    fb.textContent = "❌ Belum tepat, cuba baca semula!";
    fb.classList.add('wrong');
    const soroban = document.getElementById('soroban');
    soroban.classList.remove('shake');
    void soroban.offsetWidth; // restart animation
    soroban.classList.add('shake');
  }
}

document.getElementById('guessInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkGuess();
});

function celebrate(){
  const overlay = document.getElementById('celebrateOverlay');
  overlay.querySelectorAll('.confetti').forEach(el => el.remove());

  const candies = ['🍬','🍭','🍫','🍡','✨','⭐','🎉'];
  const colors = ['#e8b34a','#4f9ddb','#e8607a','#7bc47f','#c19af6','#ffd166'];
  const pieceCount = 45;

  for (let i = 0; i < pieceCount; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti';
    const useEmoji = Math.random() < 0.6;
    if (useEmoji) {
      piece.textContent = candies[Math.floor(Math.random() * candies.length)];
      piece.style.fontSize = (16 + Math.random() * 18) + 'px';
    } else {
      piece.style.width = piece.style.height = (8 + Math.random() * 8) + 'px';
      piece.style.borderRadius = '50%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    }
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.8 + Math.random() * 1.4) + 's';
    overlay.appendChild(piece);
  }

  document.getElementById('celebrateSub').textContent = `Jawapan: ${currentNumber}`;
  overlay.classList.add('show');
}

function closeCelebrate(){
  document.getElementById('celebrateOverlay').classList.remove('show');
  newQuestion();
}

// ---------- Init ----------
newQuestion();
</script>
</body>
</html>
