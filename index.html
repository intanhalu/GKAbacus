<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soroban Abacus (Stacking Beads)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f0e6; }
    .soroban {
      display: flex; justify-content: center; margin: 20px;
      background: #8b5a2b; padding: 20px; border-radius: 10px;
    }
    .rod {
      position: relative;
      width: 60px; height: 260px;
      margin: 10px; background: #d2b48c; border-radius: 5px;
    }
    .divider {
      position: absolute;
      top: 100px; /* bar set higher */
      width: 100%; height: 6px; background: #000;
    }
    .slot {
      position: absolute;
      width: 100%; height: 24px;
      border: 1px dashed rgba(0,0,0,0.2);
      transition: box-shadow 0.2s;
    }
    .slot.glow { box-shadow: 0 0 10px 3px yellow; }
    .bead {
      position: absolute;
      width: 40px; height: 22px; border-radius: 11px;
      background: #c19a6b; cursor: grab;
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
      transition: top 0.15s;
    }
    .label {
      position: absolute; bottom: -25px; width: 100%; text-align: center;
      font-weight: bold; color: #fff;
    }
    #output, #breakdown, #digits { margin-top: 15px; }
  </style>
</head>
<body>
  <h1>Soroban Abacus (Stacking Beads)</h1>
  <div class="soroban" id="soroban"></div>
  <div id="output"></div>
  <div id="breakdown"></div>
  <div id="digits"></div>

  <script>
    const soroban = document.getElementById('soroban');
    const output = document.getElementById('output');
    const breakdown = document.getElementById('breakdown');
    const digitsDisplay = document.getElementById('digits');
    const rods = 5;
    const labels = ["Ten-Thousands","Thousands","Hundreds","Tens","Ones"];

    buildSoroban();

    function buildSoroban() {
      soroban.innerHTML = "";
      for (let r = rods-1; r>=0; r--) {
        let rod = document.createElement('div');
        rod.className = 'rod';
        rod.dataset.place = r;

        let divider = document.createElement('div');
        divider.className = 'divider';
        rod.appendChild(divider);

        // Heaven bead
        let heavenSlot = document.createElement('div');
        heavenSlot.className = 'slot';
        heavenSlot.style.top = "20px";
        rod.appendChild(heavenSlot);

        let heaven = createBead(20, 5*Math.pow(10,r), "heaven", [20,80], [heavenSlot]);
        rod.appendChild(heaven);

        // Earth beads: each has resting slot and active slot above the bead below
        let earthPositions = [140,170,200,230];
        earthPositions.forEach((pos, idx)=>{
          let slot = document.createElement('div');
          slot.className = 'slot';
          slot.style.top = pos+"px";
          rod.appendChild(slot);

          // Active position is just above the bead below, or divider if first
          let activePos = (idx === 0) ? 110 : earthPositions[idx-1] - 25;

          let earth = createBead(pos, 1*Math.pow(10,r), "earth", [pos, activePos], [slot]);
          rod.appendChild(earth);
        });

        let label = document.createElement('div');
        label.className = 'label';
        label.textContent = labels[rods-1-r];
        rod.appendChild(label);

        soroban.appendChild(rod);
      }
    }

    function createBead(initialTop,value,type,snapPoints,slots){
      let bead=document.createElement('div');
      bead.className='bead '+type;
      bead.style.top=initialTop+"px";
      bead.dataset.value=value;
      bead.dataset.snapPoints=JSON.stringify(snapPoints);
      bead.dataset.active="false";
      bead.slots=slots;
      bead.addEventListener('mousedown',startDrag);
      return bead;
    }

    function startDrag(e){
      const bead=e.target;
      const rod=bead.parentElement;
      const rodRect=rod.getBoundingClientRect();
      const snapPoints=JSON.parse(bead.dataset.snapPoints);

      function onMouseMove(ev){
        let y=ev.clientY-rodRect.top;
        bead.style.top=y+"px";

        // Glow nearest slot
        let nearest=snapPoints.reduce((prev,curr)=>
          Math.abs(curr-y)<Math.abs(prev-y)?curr:prev
        );
        bead.slots.forEach(slot=>{
          let slotY=parseInt(slot.style.top);
          if(Math.abs(slotY-nearest)<5){
            slot.classList.add("glow");
          } else {
            slot.classList.remove("glow");
          }
        });
      }

      function onMouseUp(){
        let currentY=parseInt(bead.style.top);
        let nearest=snapPoints.reduce((prev,curr)=>
          Math.abs(curr-currentY)<Math.abs(prev-currentY)?curr:prev
        );

        // Earth beads: only move up if the bead below is active
        if (bead.classList.contains("earth")) {
          let siblings = Array.from(bead.parentElement.querySelectorAll('.earth'));
          let idx = siblings.indexOf(bead);
          if (idx > 0 && siblings[idx-1].dataset.active === "false") {
            nearest = snapPoints[0]; // force back down
          }
        }

        bead.style.top=nearest+"px";
        bead.dataset.active=(nearest!==snapPoints[0])?"true":"false";

        bead.slots.forEach(slot=>slot.classList.remove("glow"));
        document.removeEventListener('mousemove',onMouseMove);
        document.removeEventListener('mouseup',onMouseUp);
        updateOutput();
      }

      document.addEventListener('mousemove',onMouseMove);
      document.addEventListener('mouseup',onMouseUp);
    }

    function updateOutput(){
      let total=0;
      let breakdownText="<strong>Breakdown:</strong><br>";
      let digitArray=new Array(rods).fill(0);

      document.querySelectorAll('.rod').forEach((rod,index)=>{
        let rodValue=0;
        rod.querySelectorAll('.bead').forEach(b=>{
          if(b.dataset.active==="true"){
            rodValue+=parseInt(b.dataset.value);
          }
        });
        total+=rodValue;
        if(rodValue>0){
          breakdownText+=`${labels[index]}: ${rodValue}<br>`;
        }
        digitArray[index]=rodValue/Math.pow(10,rods-1-index);
      });

      breakdown.innerHTML=breakdownText+"<br><strong>Total: "+total+"</strong>";
      output.textContent="Current total = "+total;
      digitsDisplay.textContent="Digits: "+digitArray.join('');
    }
  </script>
</body>
</html>
