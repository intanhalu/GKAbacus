<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abacus Learning Hub</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8f6fb;
      margin: 0;
      padding: 40px;
      text-align: center;
    }
    h1 {
      color: #4b0082;
      margin-bottom: 40px;
      font-size: 36px;
    }
    .menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }
    .card {
      background: #6a0dad;
      color: #fff;
      width: 250px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 18px rgba(0,0,0,0.3);
    }
    .card h2 {
      margin: 0 0 15px;
      font-size: 22px;
      color: #fff;
    }
    .sub-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sub-links a {
      background: #d8b4f8;
      color: #4b0082;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .sub-links a:hover {
      background: #b57edc;
      color: #fff;
    }
    .single-link {
      display: inline-block;
      margin-top: 10px;
      background: #d8b4f8;
      color: #4b0082;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .single-link:hover {
      background: #b57edc;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>Abacus Learning Hub</h1>
  <div class="menu">
    <!-- Soroban Abacus -->
    <div class="card" onclick="location.href='asasabacus.html'">
      <h2>Asas Abacus</h2>
      <a class="single-link" href="asasabacus.html">Asas Abacus</a>
    </div>

    <!-- Addition -->
    <div class="card">
      <h2>Addition</h2>
      
    </div>

    <!-- Subtraction -->
    <div class="card">
      <h2>Subtraction</h2>
      
    </div>
  </div>
</body>
</html>
