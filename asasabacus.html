<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASAS Soroban Abacus</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background-color: #fef6e4;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    h1 {
        color: #ff6b6b;
        margin-top: 20px;
    }
    #total {
        font-size: 2em;
        margin-top: 10px;
        color: #333;
    }
    .abacus {
        display: flex;
        justify-content: center;
        margin-top: 30px;
    }
    .rod {
        background-color: #333;
        width: 10px;
        height: 300px;
        margin: 0 20px;
        position: relative;
    }
    .beam {
        position: absolute;
        top: 120px;
        left: -20px;
        width: 50px;
        height: 10px;
        background-color: #8b5e3c;
        z-index: 1;
    }
    .bead {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        position: absolute;
        left: -15px;
        cursor: pointer;
        transition: top 0.3s;
    }
    .color1 { background-color: #ff6b6b; }
    .color2 { background-color: #ffd93d; }
</style>
</head>
<body>

<h1>ASAS Soroban Abacus</h1>
<p>Click beads to move them and see the total!</p>
<div id="total">Total: 0</div>

<div class="abacus" id="abacus"></div>

<script>
    const abacus = document.getElementById('abacus');
    const totalDisplay = document.getElementById('total');
    const rods = 5; // number of rods (digits)
    const beadSpacing = 50;

    // Store bead states
    let sorobanState = Array.from({ length: rods }, () => ({ upper: 0, lower: 0 }));

    function updateTotal() {
        let total = 0;
        for (let i = 0; i < rods; i++) {
            let value = sorobanState[i].upper * 5 + sorobanState[i].lower;
            total += value * Math.pow(10, rods - i - 1);
        }
        totalDisplay.textContent = `Total: ${total}`;
    }

    for (let r = 0; r < rods; r++) {
        const rod = document.createElement('div');
        rod.classList.add('rod');

        // Beam
        const beam = document.createElement('div');
        beam.classList.add('beam');
        rod.appendChild(beam);

        // Upper bead (worth 5)
        const upperBead = document.createElement('div');
        upperBead.classList.add('bead', 'color1');
        upperBead.style.top = '20px';
        upperBead.addEventListener('click', () => {
            if (sorobanState[r].upper === 0) {
                upperBead.style.top = '90px'; // move down to beam
                sorobanState[r].upper = 1;
            } else {
                upperBead.style.top = '20px'; // move up
                sorobanState[r].upper = 0;
            }
            updateTotal();
        });
        rod.appendChild(upperBead);

        // Lower beads (worth 1 each)
        for (let b = 0; b < 4; b++) {
            const lowerBead = document.createElement('div');
            lowerBead.classList.add('bead', 'color2');
            lowerBead.style.top = `${150 + b * beadSpacing}px`;
            lowerBead.addEventListener('click', () => {
                if (parseInt(lowerBead.style.top) > 150) {
                    lowerBead.style.top = `${110 + b * beadSpacing}px`; // move up to beam
                    sorobanState[r].lower++;
                } else {
                    lowerBead.style.top = `${150 + b * beadSpacing}px`; // move down
                    sorobanState[r].lower--;
                }
                updateTotal();
            });
            rod.appendChild(lowerBead);
        }

        abacus.appendChild(rod);
    }
</script>

</body>
</html>
