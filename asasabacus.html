<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASAS Abacus for Kids</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background-color: #fef6e4;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    h1 {
        color: #ff6b6b;
        margin-top: 20px;
    }
    #countDisplay {
        font-size: 2.5rem;
        color: #4d96ff;
        margin-top: 10px;
        font-weight: bold;
    }
    #placeValues {
        font-size: 1.5rem;
        margin-top: 5px;
        color: #6bcb77;
    }
    .abacus {
        display: flex;
        justify-content: center;
        margin-top: 30px;
    }
    .rod {
        background-color: #333;
        width: 10px;
        height: 300px;
        margin: 0 20px;
        position: relative;
    }
    .rod-label {
        position: absolute;
        top: -30px;
        left: -25px;
        width: 60px;
        text-align: center;
        font-weight: bold;
        color: #333;
    }
    .bead {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        position: absolute;
        left: -15px;
        cursor: pointer;
        transition: top 0.3s;
    }
    /* Different bead colors */
    .color1 { background-color: #ff6b6b; }
    .color2 { background-color: #ffd93d; }
    .color3 { background-color: #6bcb77; }
    .color4 { background-color: #4d96ff; }
</style>
</head>
<body>

<h1>ASAS Abacus for Kids</h1>
<p>Click the beads to move them up and down!</p>
<div id="countDisplay">Total: 0</div>
<div id="placeValues">Ones: 0 | Tens: 0 | Hundreds: 0 | Thousands: 0 | Ten-Thousands: 0</div>

<div class="abacus" id="abacus"></div>

<script>
    const abacus = document.getElementById('abacus');
    const countDisplay = document.getElementById('countDisplay');
    const placeValuesDisplay = document.getElementById('placeValues');

    const rods = 5; // number of rods
    const beadsPerRod = 5; // beads per rod
    const beadSpacing = 50; // vertical spacing
    let totalCount = 0;
    let rodCounts = Array(rods).fill(0); // track beads per rod

    const placeNames = ["Ones", "Tens", "Hundreds", "Thousands", "Ten-Thousands"];

    // Create rods and beads
    for (let r = 0; r < rods; r++) {
        const rod = document.createElement('div');
        rod.classList.add('rod');

        // Label for place value
        const label = document.createElement('div');
        label.classList.add('rod-label');
        label.textContent = placeNames[r];
        rod.appendChild(label);

        for (let b = 0; b < beadsPerRod; b++) {
            const bead = document.createElement('div');
            bead.classList.add('bead', `color${(b % 4) + 1}`);
            bead.style.top = `${b * beadSpacing + 10}px`;

            bead.dataset.up = "false"; // bead starts down

            bead.addEventListener('click', () => {
                if (bead.dataset.up === "false") {
                    bead.style.top = `${10}px`; // move to top
                    bead.dataset.up = "true";
                    totalCount += Math.pow(10, r);
                    rodCounts[r]++;
                } else {
                    bead.style.top = `${b * beadSpacing + 10}px`; // move back down
                    bead.dataset.up = "false";
                    totalCount -= Math.pow(10, r);
                    rodCounts[r]--;
                }
                updateDisplay();
            });

            rod.appendChild(bead);
        }
        abacus.appendChild(rod);
    }

    function updateDisplay() {
        countDisplay.textContent = `Total: ${totalCount}`;
        let placeText = placeNames.map((name, i) => `${name}: ${rodCounts[i]}`).join(" | ");
        placeValuesDisplay.textContent = placeText;
    }
</script>

</body>
</html>
