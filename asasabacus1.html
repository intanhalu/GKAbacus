<body>
  <h1>Asas Abacus</h1>
  <div class="soroban" id="soroban"></div>
  <div id="output"></div>
  <div id="breakdown"></div>
  <div id="digits"></div>
  <div id="feedback"></div>
  
  <br><br>
  <a href="index.html">🏠 Back to Home</a>
  
  <script>
    const soroban = document.getElementById('soroban');
    const output = document.getElementById('output');
    const breakdown = document.getElementById('breakdown');
    const digitsDisplay = document.getElementById('digits');

    const labels = ["Sepuluh Ribu","Seribu","Seratus","Sepuluh","Sa"];
    let currentAnswer = 0;

    buildSoroban();

    function buildSoroban() {
      soroban.innerHTML = "";
      for (let r = labels.length-1; r>=0; r--) {
        let rod = document.createElement('div');
        rod.className = 'rod';
        rod.dataset.place = r;

        let divider = document.createElement('div');
        divider.className = 'divider';
        rod.appendChild(divider);

        // Heaven bead
        let heaven = createBead(20, 5*Math.pow(10,r), "heaven");
        rod.appendChild(heaven);

        // Earth beads (FIXED: Restored the missing positions array)
        let earthPositions =;
        earthPositions.forEach((pos, idx)=>{
          let earth = createBead(pos, 1*Math.pow(10,r), "earth");
          earth.dataset.index = idx;
          rod.appendChild(earth);
        });

        let label = document.createElement('div');
        label.className = 'label';
        label.textContent = labels[labels.length-1-r];
        rod.appendChild(label);

        soroban.appendChild(rod);
      }
    }

    function createBead(initialTop,value,type){
      let bead=document.createElement('div');
      bead.className='bead '+type;
      bead.style.top=initialTop+"px";
      bead.dataset.value=value;
      bead.dataset.initialTop=initialTop;
      bead.dataset.active="false";
      
      // Support both platforms seamlessly
      bead.addEventListener('mousedown', startDrag);
      bead.addEventListener('touchstart', startDrag, { passive: false });
      return bead;
    }

    function startDrag(e){
      if (e.type === 'touchstart') {
        e.preventDefault(); // Prevents phone from pulling-to-refresh or bouncing
      }

      const bead=e.target;
      const rod=bead.parentElement;
      const rodRect=rod.getBoundingClientRect();
      
      let clientY = (e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;
      let offsetY = clientY - rodRect.top - parseInt(bead.style.top);

      function onMouseMove(ev){
        let currentY = (ev.type === 'touchmove') ? ev.touches[0].clientY : ev.clientY;
        let y=currentY-rodRect.top-offsetY;
        bead.style.top=y+"px";

        // INSTANT DISPLAY UPDATE LOGIC
        // Decides live if bead is pushed up/down far enough to count towards numbers
        let movedDistance = Math.abs(y - parseInt(bead.dataset.initialTop));
        bead.dataset.active = (movedDistance > 12) ? "true" : "false";
        updateDigits(); 
      }

      function onMouseUp(){
        let nearest;
        if (bead.classList.contains("heaven")) {
          nearest = (parseInt(bead.style.top) > 50) ? 80 : parseInt(bead.dataset.initialTop);
        } else {
          let idx = parseInt(bead.dataset.index);
          if (bead.dataset.active === "true") {
            nearest = parseInt(bead.dataset.initialTop); // move back down
          } else {
            if (idx === 0) {
              nearest = (parseInt(bead.style.top) < 125) ? 110 : parseInt(bead.dataset.initialTop);
            } else {
              let siblings = Array.from(bead.parentElement.querySelectorAll('.earth'));
              if (siblings[idx-1].dataset.active === "true") {
                nearest = parseInt(siblings[idx-1].dataset.initialTop);
              } else {
                nearest = parseInt(bead.dataset.initialTop);
              }
            }
          }
        }

        bead.style.top = nearest + "px";
        bead.dataset.active = (nearest !== parseInt(bead.dataset.initialTop)) ? "true" : "false";

        if (bead.dataset.active === "true") {
          bead.classList.add("active");
        } else {
          bead.classList.remove("active");
        }

        document.removeEventListener('mousemove',onMouseMove);
        document.removeEventListener('mouseup',onMouseUp);
        document.removeEventListener('touchmove',onMouseMove);
        document.removeEventListener('touchend',onMouseUp);

        updateDigits();
        autoCheckAnswer();
      }

      document.addEventListener('mousemove',onMouseMove);
      document.addEventListener('mouseup',onMouseUp);
      document.addEventListener('touchmove',onMouseMove, { passive: false });
      document.addEventListener('touchend',onMouseUp);
    }

    function getSorobanValue(){
      let total=0;
      document.querySelectorAll('.rod').forEach(rod=>{
        rod.querySelectorAll('.bead').forEach(b=>{
          if(b.dataset.active==="true"){
            total+=parseInt(b.dataset.value);
          }
        });
      });
      return total;
    }

    function updateDigits(){
      let total=0;
      let breakdownText="<strong>Breakdown:</strong><br>";
      let totalRods = labels.length; // Replaced undefined 'rods' variable
      let digitArray=new Array(totalRods).fill(0);

      document.querySelectorAll('.rod').forEach((rod,index)=>{
        let rodValue=0;
        rod.querySelectorAll('.bead').forEach(b=>{
          if(b.dataset.active==="true"){
            rodValue+=parseInt(b.dataset.value);
          }
        });
        total+=rodValue;
        if(rodValue>0){
          breakdownText+=`${labels[index]}: ${rodValue}<br>`;
        }
        
        // Turns actual mathematical place value into isolated 0-9 single digits for the display
        let multiplier = Math.pow(10, totalRods - 1 - index);
        digitArray[index] = Math.floor(rodValue / multiplier);
      });

      breakdown.innerHTML=breakdownText+"<br><strong>Total: "+total+"</strong>";
      output.textContent="Current total = "+total;
      digitsDisplay.textContent="Digits: "+digitArray.join('');
    }

    function autoCheckAnswer(){
      let sorobanValue = getSorobanValue();
      let feedback = document.getElementById('feedback');
      if (sorobanValue === currentAnswer) {
        feedback.textContent = "✅ Correct! 🎉 Well done!";
        feedback.style.color = "green";
      } else {
        feedback.textContent = "❌ Wrong. Try again!";
        feedback.style.color = "red";
      }
    }

    function newQuestion() {
       currentAnswer = 0; 
    }

    newQuestion();
  </script>
</body>
