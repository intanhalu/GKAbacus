<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Latihan Abacus (Tambah)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f4f0e6; }
    h1 { margin-top: 20px; }
    #question { font-size: 24px; margin: 20px; }
    #digits { font-size: 20px; margin: 10px; color: #4b0082; }
    #feedback { font-size: 20px; margin: 10px; font-weight: bold; }
    select, button { padding: 10px 20px; margin: 10px; font-size: 16px; }
    .soroban {
      display: flex; justify-content: center; margin: 20px;
      background: #8b5a2b; padding: 20px; border-radius: 10px;
    }
    .rod {
      position: relative;
      width: 60px; height: 260px;
      margin: 10px; background: #d2b48c; border-radius: 5px;
    }
    .divider {
      position: absolute; top: 100px; width: 100%; height: 6px; background: #000;
    }
    .bead {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 40px; height: 22px; border-radius: 11px;
      background: #c19a6b; cursor: grab;
      box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3);
      transition: top 0.15s, box-shadow 0.3s;
    }
    .bead.active {
      box-shadow: 0 0 10px 4px gold;
      background: #deb887;
    }
    .label {
      position: absolute; bottom: -25px; width: 100%; text-align: center;
      font-weight: bold; color: #fff;
    }
  </style>
</head>
<body>
  <h1>Asas Abacus</h1>
  <div class="soroban" id="soroban"></div>
  <div id="output"></div>
  <div id="breakdown"></div>
  <div id="digits"></div>
  

  <div class="soroban" id="soroban"></div>
<br><br>
  <a href="index.html">🏠 Back to Home</a>
  <script>
    const soroban = document.getElementById('soroban');
    const labels = ["Sepuluh Ribu","Seribu","Seratus","Sepuluh","Sa"];
    let currentAnswer = 0;

    buildSoroban();

    function buildSoroban() {
      soroban.innerHTML = "";
      for (let r = labels.length-1; r>=0; r--) {
        let rod = document.createElement('div');
        rod.className = 'rod';
        rod.dataset.place = r;

        let divider = document.createElement('div');
        divider.className = 'divider';
        rod.appendChild(divider);

        // Heaven bead
        let heaven = createBead(20, 5*Math.pow(10,r), "heaven");
        rod.appendChild(heaven);

        // Earth beads
        let earthPositions = [140,170,200,230];
        earthPositions.forEach((pos, idx)=>{
          let earth = createBead(pos, 1*Math.pow(10,r), "earth");
          earth.dataset.index = idx;
          rod.appendChild(earth);
        });

        let label = document.createElement('div');
        label.className = 'label';
        label.textContent = labels[labels.length-1-r];
        rod.appendChild(label);

        soroban.appendChild(rod);
      }
    }

    function createBead(initialTop,value,type){
      let bead=document.createElement('div');
      bead.className='bead '+type;
      bead.style.top=initialTop+"px";
      bead.dataset.value=value;
      bead.dataset.initialTop=initialTop;
      bead.dataset.active="false";
      bead.addEventListener('mousedown',startDrag);
      return bead;
    }

    function startDrag(e){
      const bead=e.target;
      const rod=bead.parentElement;
      const rodRect=rod.getBoundingClientRect();
      let offsetY = e.clientY - rodRect.top - parseInt(bead.style.top);

      function onMouseMove(ev){
        let y=ev.clientY-rodRect.top-offsetY;
        bead.style.top=y+"px";
      }

      function onMouseUp(){
        let nearest;
        if (bead.classList.contains("heaven")) {
          nearest = (parseInt(bead.style.top) > 50) ? 80 : parseInt(bead.dataset.initialTop);
        } else {
          let idx = parseInt(bead.dataset.index);
          if (bead.dataset.active === "true") {
            nearest = parseInt(bead.dataset.initialTop); // move back down
          } else {
            if (idx === 0) {
              nearest = (parseInt(bead.style.top) < 125) ? 110 : parseInt(bead.dataset.initialTop);
            } else {
              let siblings = Array.from(bead.parentElement.querySelectorAll('.earth'));
              if (siblings[idx-1].dataset.active === "true") {
                nearest = parseInt(siblings[idx-1].dataset.initialTop);
              } else {
                nearest = parseInt(bead.dataset.initialTop);
              }
            }
          }
        }

        bead.style.top = nearest + "px";
        bead.dataset.active = (nearest !== parseInt(bead.dataset.initialTop)) ? "true" : "false";

        if (bead.dataset.active === "true") {
          bead.classList.add("active");
        } else {
          bead.classList.remove("active");
        }

        document.removeEventListener('mousemove',onMouseMove);
        document.removeEventListener('mouseup',onMouseUp);

        updateDigits();
        autoCheckAnswer();
      }

      document.addEventListener('mousemove',onMouseMove);
      document.addEventListener('mouseup',onMouseUp);
    }

    function getSorobanValue(){
      let total=0;
      document.querySelectorAll('.rod').forEach(rod=>{
        rod.querySelectorAll('.bead').forEach(b=>{
          if(b.dataset.active==="true"){
            total+=parseInt(b.dataset.value);
          }
        });
      });
      return total;
    }

    function updateDigits(){
      let total=0;
      let breakdownText="<strong>Breakdown:</strong><br>";
      let digitArray=new Array(rods).fill(0);

      document.querySelectorAll('.rod').forEach((rod,index)=>{
        let rodValue=0;
        rod.querySelectorAll('.bead').forEach(b=>{
          if(b.dataset.active==="true"){
            rodValue+=parseInt(b.dataset.value);
          }
        });
        total+=rodValue;
        if(rodValue>0){
          breakdownText+=`${labels[index]}: ${rodValue}<br>`;
        }
        digitArray[index]=rodValue/Math.pow(10,rods-1-index);
      });

      breakdown.innerHTML=breakdownText+"<br><strong>Total: "+total+"</strong>";
      output.textContent="Current total = "+total;
      digitsDisplay.textContent="Digits: "+digitArray.join('');
    }


    function autoCheckAnswer(){
      let sorobanValue = getSorobanValue();
      if (sorobanValue === currentAnswer) {
        document.getElementById('feedback').textContent = "✅ Correct! 🎉 Well done!";
        document.getElementById('feedback').style.color = "green";
      } else {
        document.getElementById('feedback').textContent = "❌ Wrong. Try again!";
        document.getElementById('feedback').style.color = "red";
      }
    }

   
    // First question on load
    newQuestion();
  </script>
</body>
</html>
